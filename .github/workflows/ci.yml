name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check version because reasons
        run: npm -v

      - name: Install dependencies
        run: npm ci

      - name: Check code style
        run: npx biome check

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Run tests
        run: npx vitest run --reporter=github-actions
